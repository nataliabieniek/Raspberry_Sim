services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: raspberry_sim_frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: raspberry_sim_backend
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    working_dir: /app/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/raspberry_sim
      - API_PREFIX=/api
      - SECRET_KEY=dev_secret_key
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: raspberry_sim_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=raspberry_sim
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raspberry_sim"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend_node_modules:
  postgres_data:
